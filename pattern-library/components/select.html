  @component-meta
  name: Select
  category: Primitives
  file: select.html
  classes: select-field, select-field-sm, select-field-error
  spec: components/ui/select.md
  css: src/css/components/select.css
  when-to-use: Choosing one option from a predefined list.

  @end-meta
-->

<section class="pl-section" data-pl-section="default">
  <h2 class="pl-section-title">Default</h2>
  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>
    <div style="max-width: 20rem;">
      <div class="field">
        <label class="input-label">Diet Type</label>
        <select class="select-field">
          <option value="" disabled selected>Select a diet type…</option>
          <option>Low Sodium</option>
          <option>Diabetic</option>
          <option>Renal</option>
          <option>Heart Healthy</option>
        </select>
      </div>
    </div>
  </div>
</section>

<section class="pl-section" data-pl-section="states">
  <h2 class="pl-section-title">States</h2>
  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>
    <div style="display: flex; gap: var(--space-4); flex-wrap: wrap; max-width: 40rem;">
      <div style="flex: 1; min-width: 12rem;">
        <p class="pl-col-label">Default</p>
        <select class="select-field"><option>Low Sodium</option></select>
      </div>
      <div style="flex: 1; min-width: 12rem;">
        <p class="pl-col-label">Small</p>
        <select class="select-field select-field-sm"><option>Low Sodium</option></select>
      </div>
      <div style="flex: 1; min-width: 12rem;">
        <p class="pl-col-label">Disabled</p>
        <select class="select-field" disabled><option>Low Sodium</option></select>
      </div>
      <div style="flex: 1; min-width: 12rem;">
        <p class="pl-col-label">Error</p>
        <select class="select-field select-field-error"><option>Select…</option></select>
      </div>
    </div>
  </div>
</section>
