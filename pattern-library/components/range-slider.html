<!--
  @component-meta
  name: Range Slider
  category: Primitives
  file: range-slider.html
  classes: range-slider
  spec: components/ui/range-slider.md
  css: src/css/components/range-slider.css
  when-to-use: Numeric value selection within a known range — volume, thresholds, percentage targets.
  do-not-use-when: Exact numeric input is required — use a number input instead. Not for discrete option selection — use segmented control.
  @end-meta
-->


<!-- =====================================================================
     Section 1: Default Range Slider
     ===================================================================== -->

<section class="pl-section" data-pl-section="default">
  <h2 class="pl-section-title">Default Range Slider</h2>

  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>

    <div style="padding: var(--space-6); max-width: 24rem;">
      <label style="display: block; font-family: var(--font-body); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-primary); margin-bottom: var(--space-2);">
        Target HbA1c (%)
      </label>
      <input type="range" class="range-slider" min="5" max="10" value="7" step="0.1" aria-label="Target HbA1c" />
      <div style="display: flex; justify-content: space-between; font-family: var(--font-body); font-size: var(--text-xs); color: var(--color-text-tertiary); margin-top: var(--space-1);">
        <span>5.0%</span>
        <span>10.0%</span>
      </div>
    </div>
  </div>
</section>


<!-- =====================================================================
     Section 2: With Live Value
     ===================================================================== -->

<section class="pl-section" data-pl-section="live-value">
  <h2 class="pl-section-title">With Live Value Display</h2>

  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>

    <div style="padding: var(--space-6); max-width: 24rem;">
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: var(--space-2);">
        <label for="slider-live" style="font-family: var(--font-body); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-primary);">
          Risk threshold
        </label>
        <span id="slider-live-value" style="font-family: var(--font-mono); font-size: var(--text-sm); font-weight: 600; color: var(--color-primary);">50%</span>
      </div>
      <input type="range" class="range-slider" id="slider-live" min="0" max="100" value="50" aria-label="Risk threshold" />
    </div>
  </div>
</section>


<!-- =====================================================================
     Section 3: Disabled
     ===================================================================== -->

<section class="pl-section" data-pl-section="disabled">
  <h2 class="pl-section-title">Disabled</h2>

  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>

    <div style="padding: var(--space-6); max-width: 24rem;">
      <label style="display: block; font-family: var(--font-body); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-disabled); margin-bottom: var(--space-2);">
        Locked setting
      </label>
      <input type="range" class="range-slider" min="0" max="100" value="30" disabled aria-label="Locked setting" />
    </div>
  </div>
</section>


<!-- =====================================================================
     Section 4: Multiple Sliders
     ===================================================================== -->

<section class="pl-section" data-pl-section="multiple">
  <h2 class="pl-section-title">Multiple Sliders</h2>

  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>

    <div style="padding: var(--space-6); max-width: 24rem; display: flex; flex-direction: column; gap: var(--space-6);">
      <div>
        <label style="display: block; font-family: var(--font-body); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-primary); margin-bottom: var(--space-2);">Protein target (g)</label>
        <input type="range" class="range-slider" min="30" max="120" value="65" aria-label="Protein target" />
      </div>
      <div>
        <label style="display: block; font-family: var(--font-body); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-primary); margin-bottom: var(--space-2);">Carb target (g)</label>
        <input type="range" class="range-slider" min="100" max="300" value="180" aria-label="Carb target" />
      </div>
      <div>
        <label style="display: block; font-family: var(--font-body); font-size: var(--text-sm); font-weight: 500; color: var(--color-text-primary); margin-bottom: var(--space-2);">Fat target (g)</label>
        <input type="range" class="range-slider" min="20" max="100" value="50" aria-label="Fat target" />
      </div>
    </div>
  </div>
</section>


<!-- Component JS: live value display -->
<script>
(function() {
  var slider = document.getElementById('slider-live');
  var display = document.getElementById('slider-live-value');
  if (slider && display) {
    slider.addEventListener('input', function() {
      display.textContent = slider.value + '%';
    });
  }
})();
</script>
