<section class="pl-section" data-pl-section="variants">
  <h2 class="pl-section-title">Variants</h2>
  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>
    <div style="display: flex; gap: var(--space-6); flex-wrap: wrap; align-items: center;">
      <div style="display: flex; align-items: center; gap: var(--space-2);"><span class="indicator indicator-success"></span><span style="font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-primary);">Success</span></div>
      <div style="display: flex; align-items: center; gap: var(--space-2);"><span class="indicator indicator-warning"></span><span style="font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-primary);">Warning</span></div>
      <div style="display: flex; align-items: center; gap: var(--space-2);"><span class="indicator indicator-error"></span><span style="font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-primary);">Error</span></div>
      <div style="display: flex; align-items: center; gap: var(--space-2);"><span class="indicator indicator-info"></span><span style="font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-primary);">Info</span></div>
      <div style="display: flex; align-items: center; gap: var(--space-2);"><span class="indicator indicator-online"></span><span style="font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-primary);">Online</span></div>
      <div style="display: flex; align-items: center; gap: var(--space-2);"><span class="indicator indicator-offline"></span><span style="font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-primary);">Offline</span></div>
    </div>
  </div>
</section>

<section class="pl-section" data-pl-section="pulse">
  <h2 class="pl-section-title">Pulse Animation</h2>
  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>
    <div style="display: flex; align-items: center; gap: var(--space-2);">
      <span class="indicator indicator-online indicator-pulse"></span>
      <span style="font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text-primary);">Live — receiving data</span>
    </div>
  </div>
</section>
