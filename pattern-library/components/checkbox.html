<!--
  @component-meta
  name: Checkbox
  category: Primitives
  file: checkbox.html
  classes: checkbox, checkbox-input, checkbox-label, checkbox-description, checkbox-input-error
  spec: components/ui/checkbox.md
  css: src/css/components/checkbox.css
  when-to-use: Boolean or multi-select choices in forms.
  do-not-use-when: Only one option can be selected — use radio buttons instead.
  @end-meta
-->

<section class="pl-section" data-pl-section="default">
  <h2 class="pl-section-title">Default</h2>
  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>
    <div style="display: flex; flex-direction: column; gap: var(--space-3);">
      <label class="checkbox">
        <input type="checkbox" class="checkbox-input" checked>
        <span class="checkbox-label">Receive email notifications</span>
      </label>
      <label class="checkbox">
        <input type="checkbox" class="checkbox-input">
        <span class="checkbox-label">Receive SMS alerts</span>
      </label>
      <label class="checkbox">
        <input type="checkbox" class="checkbox-input">
        <span class="checkbox-label">Weekly summary report</span>
      </label>
    </div>
  </div>
</section>

<section class="pl-section" data-pl-section="states">
  <h2 class="pl-section-title">States</h2>
  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>
    <div style="display: flex; gap: var(--space-6); flex-wrap: wrap;">
      <div><p class="pl-col-label">Unchecked</p><label class="checkbox"><input type="checkbox" class="checkbox-input"><span class="checkbox-label">Option</span></label></div>
      <div><p class="pl-col-label">Checked</p><label class="checkbox"><input type="checkbox" class="checkbox-input" checked><span class="checkbox-label">Option</span></label></div>
      <div><p class="pl-col-label">Indeterminate</p><label class="checkbox"><input type="checkbox" class="checkbox-input" id="cb-indeterminate"><span class="checkbox-label">Option</span></label></div>
      <div><p class="pl-col-label">Disabled</p><label class="checkbox"><input type="checkbox" class="checkbox-input" disabled><span class="checkbox-label">Option</span></label></div>
      <div><p class="pl-col-label">Error</p><label class="checkbox"><input type="checkbox" class="checkbox-input checkbox-input-error"><span class="checkbox-label">Option</span></label></div>
    </div>
  </div>
</section>

<section class="pl-section" data-pl-section="with-description">
  <h2 class="pl-section-title">With Description</h2>
  <div class="pl-canvas" style="background: var(--color-surface-page);">
    <p class="pl-canvas-label">surface-page (#FBFAF8)</p>
    <div style="display: flex; flex-direction: column; gap: var(--space-4);">
      <label class="checkbox">
        <input type="checkbox" class="checkbox-input" checked>
        <div>
          <span class="checkbox-label">Email notifications</span>
          <p class="checkbox-description">Get notified when a patient's lab results are ready.</p>
        </div>
      </label>
      <label class="checkbox">
        <input type="checkbox" class="checkbox-input">
        <div>
          <span class="checkbox-label">SMS alerts</span>
          <p class="checkbox-description">Critical alerts sent to your phone via text message.</p>
        </div>
      </label>
    </div>
  </div>
</section>

<script>
(function() {
  var el = document.getElementById('cb-indeterminate');
  if (el) el.indeterminate = true;
})();
</script>
