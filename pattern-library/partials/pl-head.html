<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cena Health Pattern Library</title>

<!-- Fonts: Plus Jakarta Sans (display) + Source Sans 3 (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">

<!-- Cena Health design system -->
<link rel="stylesheet" href="/src/css/main.css">

<style>
  /* =========================================================
     Pattern Library Chrome
     These styles govern the PL shell (sidebar, header, canvas).
     Use semantic surface and border tokens only — never raw
     warm-* palette steps (the scale is inverted: 50=darkest,
     950=lightest, making raw steps error-prone).
     ========================================================= */

  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--font-body);
    font-size: var(--text-sm);
    color: var(--color-text-primary);
    background: var(--color-surface-secondary);
    -webkit-font-smoothing: antialiased;
  }

  /* Sidebar */
  .pl-sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 240px;
    height: 100vh;
    overflow-y: auto;
    background: var(--color-surface-primary);
    border-right: 1px solid var(--color-border-default);
    display: flex;
    flex-direction: column;
    z-index: 100;
  }

  .pl-sidebar-brand {
    padding: var(--space-5) var(--space-5) var(--space-4);
    border-bottom: 1px solid var(--color-border-default);
  }

  .pl-sidebar-brand-name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: 700;
    color: var(--color-text-primary);
    letter-spacing: -0.01em;
    display: block;
    margin: 0 0 2px;
  }

  .pl-sidebar-brand-sub {
    font-size: var(--text-xs);
    color: var(--color-text-tertiary);
    margin: 0;
  }

  .pl-sidebar-nav {
    flex: 1;
    padding: var(--space-4) 0 var(--space-6);
    overflow-y: auto;
  }

  .pl-nav-section {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    padding: var(--space-4) var(--space-5) var(--space-1);
  }

  .pl-nav-link {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-1-5) var(--space-5);
    font-size: var(--text-sm);
    font-weight: 400;
    color: var(--color-text-secondary);
    text-decoration: none;
    border-radius: 0;
    transition: background var(--duration-fast) var(--ease-transition),
                color var(--duration-fast) var(--ease-transition);
  }

  .pl-nav-link:hover {
    background: var(--color-surface-secondary);
    color: var(--color-text-primary);
  }

  .pl-nav-link.active {
    background: var(--color-teal-950);
    color: var(--color-teal-400);
    font-weight: 500;
  }

  /* Main content area */
  .pl-main {
    margin-left: 240px;
    min-height: 100vh;
    padding: var(--space-8) var(--space-10);
    max-width: 1100px;
  }

  /* Page header */
  .pl-page-header {
    margin-bottom: var(--space-8);
    padding-bottom: var(--space-6);
    border-bottom: 1px solid var(--color-border-default);
  }

  .pl-page-title {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--color-text-primary);
    margin: 0 0 var(--space-1);
    letter-spacing: -0.02em;
  }

  .pl-page-description {
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin: 0;
  }

  /* Section within a page */
  .pl-section {
    margin-bottom: var(--space-12);
  }

  .pl-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    margin: 0 0 var(--space-4);
    padding-bottom: var(--space-2);
    border-bottom: 1px solid var(--color-border-default);
  }

  .pl-section-description {
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin: 0 0 var(--space-4);
  }

  /* Canvas: the surface on which components are shown */
  .pl-canvas {
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    border: 1px solid var(--color-border-default);
  }

  .pl-canvas-label {
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--color-text-tertiary);
    margin: 0 0 var(--space-4);
    font-family: var(--font-mono);
  }

  .pl-stack {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }

  .pl-grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-4);
  }

  .pl-col-label {
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--color-text-tertiary);
    text-align: center;
    margin: 0 0 var(--space-3);
  }

  .pl-note {
    font-size: var(--text-xs);
    color: var(--color-text-tertiary);
    margin: var(--space-3) 0 0;
    font-style: italic;
  }

  /* ---- Layout helpers for component examples ---- */

  /* Inline row of components — wraps on overflow */
  .pl-row {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-3);
    align-items: center;
  }

  /* Inline row with tighter gap */
  .pl-row-sm {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
    align-items: center;
  }

  /* Stacked column — gap-4 (use .pl-stack for gap-3) */
  .pl-stack-lg {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  /* Constrained demo containers — center within canvas */
  .pl-demo-sm  { max-width: 25rem; margin: 0 auto; }
  .pl-demo-md  { max-width: 32.5rem; margin: 0 auto; }
  .pl-demo-lg  { max-width: 40rem; margin: 0 auto; }
  .pl-demo-xl  { max-width: 36rem; }

  /* Canvas that needs extra height for overlays (dropdowns, tooltips) */
  .pl-canvas-tall { min-height: 16rem; }
  .pl-canvas-xl   { min-height: 20rem; }

  /* Right-aligned trigger — pushes a single child to the right */
  .pl-align-right {
    display: flex;
    justify-content: flex-end;
  }

  /* Inline demo text — body copy used in context examples */
  .pl-demo-text {
    font-family: var(--font-body);
    font-size: var(--text-base);
    font-weight: 400;
    color: var(--color-text-primary);
  }

  .pl-demo-text-medium {
    font-family: var(--font-body);
    font-size: var(--text-base);
    font-weight: 500;
    color: var(--color-text-primary);
  }

  /* Static menu panel replica — for item state documentation */
  .pl-menu-demo {
    max-width: 14rem;
    background: var(--color-surface-page);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-md);
    padding: var(--space-1) 0;
  }

  /* Index page cards */
  .pl-index-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: var(--space-4);
  }

  .pl-index-card {
    display: block;
    background: var(--color-surface-page);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    text-decoration: none;
    color: inherit;
    transition: border-color var(--duration-fast) var(--ease-transition),
                box-shadow var(--duration-fast) var(--ease-transition);
  }

  .pl-index-card:hover {
    border-color: var(--color-border-strong);
    box-shadow: var(--shadow-sm);
  }

  .pl-index-card-title {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--color-text-primary);
    margin: 0 0 var(--space-1);
  }

  .pl-index-card-desc {
    font-size: var(--text-xs);
    color: var(--color-text-secondary);
    margin: 0 0 var(--space-3);
    line-height: 1.5;
  }

  .pl-index-card-count {
    font-size: var(--text-xs);
    color: var(--color-text-tertiary);
  }
</style>
