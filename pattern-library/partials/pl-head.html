<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cena Health Pattern Library</title>

<!-- Fonts: Plus Jakarta Sans (display) + Source Sans 3 (body) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">

<!-- Cena Health design system -->
<link rel="stylesheet" href="/src/css/main.css">

<style>
  /* =========================================================
     Pattern Library Chrome
     These styles govern the PL shell (sidebar, header, canvas).
     They intentionally use raw values — they are NOT part of
     the design system being documented.
     ========================================================= */

  *, *::before, *::after { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--font-body);
    font-size: var(--text-sm);
    color: var(--color-text-primary);
    background: var(--color-warm-200);
    -webkit-font-smoothing: antialiased;
  }

  /* Sidebar */
  .pl-sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 240px;
    height: 100vh;
    overflow-y: auto;
    background: var(--color-warm-100);
    border-right: 1px solid var(--color-warm-200);
    display: flex;
    flex-direction: column;
    z-index: 100;
  }

  .pl-sidebar-brand {
    padding: var(--space-5) var(--space-5) var(--space-4);
    border-bottom: 1px solid var(--color-warm-200);
  }

  .pl-sidebar-brand-name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: 700;
    color: var(--color-text-primary);
    letter-spacing: -0.01em;
    display: block;
    margin: 0 0 2px;
  }

  .pl-sidebar-brand-sub {
    font-size: var(--text-xs);
    color: var(--color-text-tertiary);
    margin: 0;
  }

  .pl-sidebar-nav {
    flex: 1;
    padding: var(--space-4) 0 var(--space-6);
    overflow-y: auto;
  }

  .pl-nav-section {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    padding: var(--space-4) var(--space-5) var(--space-1);
  }

  .pl-nav-link {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-1-5) var(--space-5);
    font-size: var(--text-sm);
    font-weight: 400;
    color: var(--color-text-secondary);
    text-decoration: none;
    border-radius: 0;
    transition: background var(--duration-fast) var(--ease-transition),
                color var(--duration-fast) var(--ease-transition);
  }

  .pl-nav-link:hover {
    background: var(--color-warm-200);
    color: var(--color-text-primary);
  }

  .pl-nav-link.active {
    background: var(--color-teal-900);
    color: var(--color-teal-400);
    font-weight: 500;
  }

  /* Main content area */
  .pl-main {
    margin-left: 240px;
    min-height: 100vh;
    padding: var(--space-8) var(--space-10);
    max-width: 1100px;
  }

  /* Page header */
  .pl-page-header {
    margin-bottom: var(--space-8);
    padding-bottom: var(--space-6);
    border-bottom: 1px solid var(--color-warm-300);
  }

  .pl-page-title {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: 700;
    color: var(--color-text-primary);
    margin: 0 0 var(--space-1);
    letter-spacing: -0.02em;
  }

  .pl-page-description {
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin: 0;
  }

  /* Section within a page */
  .pl-section {
    margin-bottom: var(--space-12);
  }

  .pl-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    margin: 0 0 var(--space-4);
    padding-bottom: var(--space-2);
    border-bottom: 1px solid var(--color-warm-300);
  }

  .pl-section-description {
    font-size: var(--text-sm);
    color: var(--color-text-secondary);
    margin: 0 0 var(--space-4);
  }

  /* Canvas: the surface on which components are shown */
  .pl-canvas {
    border-radius: var(--radius-lg);
    padding: var(--space-6);
    border: 1px solid var(--color-warm-300);
  }

  .pl-canvas-label {
    font-size: var(--text-xs);
    font-weight: 500;
    color: var(--color-text-tertiary);
    margin: 0 0 var(--space-4);
    font-family: var(--font-mono);
  }

  .pl-stack {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }

  .pl-grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: var(--space-4);
  }

  .pl-col-label {
    font-size: var(--text-xs);
    font-weight: 600;
    color: var(--color-text-tertiary);
    text-align: center;
    margin: 0 0 var(--space-3);
  }

  .pl-note {
    font-size: var(--text-xs);
    color: var(--color-text-tertiary);
    margin: var(--space-3) 0 0;
    font-style: italic;
  }

  /* Index page cards */
  .pl-index-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: var(--space-4);
  }

  .pl-index-card {
    display: block;
    background: var(--color-surface-page);
    border: 1px solid var(--color-border-default);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    text-decoration: none;
    color: inherit;
    transition: border-color var(--duration-fast) var(--ease-transition),
                box-shadow var(--duration-fast) var(--ease-transition);
  }

  .pl-index-card:hover {
    border-color: var(--color-border-strong);
    box-shadow: var(--shadow-sm);
  }

  .pl-index-card-title {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: 600;
    color: var(--color-text-primary);
    margin: 0 0 var(--space-1);
  }

  .pl-index-card-desc {
    font-size: var(--text-xs);
    color: var(--color-text-secondary);
    margin: 0 0 var(--space-3);
    line-height: 1.5;
  }

  .pl-index-card-count {
    font-size: var(--text-xs);
    color: var(--color-text-tertiary);
  }
</style>
